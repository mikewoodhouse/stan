{% extends "index.html" %}
{% block data %}
<h1>
    Players
</h1>
<table>
    <thead>
        <tr>
            <th>name</th>
            <th>from</th>
            <th>to</th>
            <th>matches</th>
        </tr>
    </thead>
    {% for s in data %}
    <tr>
        <td>{{s.name}}</td>
        <td>{{s.from_year}}</td>
        <td>{{s.to_year}}</td>
        <td>{{s.matches}}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
